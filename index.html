<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>达人信息同步系统 - 多Sheet版</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', 'Microsoft YaHei', sans-serif; }
        body { background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%); min-height: 100vh; padding: 20px; }
        
        .container { 
            max-width: 800px; 
            margin: 30px auto; 
            background: white; 
            border-radius: 16px; 
            box-shadow: 0 10px 30px rgba(0,0,0,0.1); 
            overflow: hidden; 
        }
        
        /* 头部 */
        .header { 
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); 
            color: white; 
            padding: 30px; 
            text-align: center; 
        }
        .header h1 { font-size: 28px; margin-bottom: 8px; display: flex; align-items: center; justify-content: center; gap: 12px; }
        .header h1 .icon { font-size: 32px; }
        .header .subtitle { opacity: 0.9; font-size: 15px; margin-bottom: 15px; }
        
        /* 状态指示器 */
        .status-indicator { 
            display: inline-flex; 
            align-items: center; 
            gap: 8px; 
            background: rgba(255,255,255,0.2); 
            padding: 8px 16px; 
            border-radius: 20px; 
            font-size: 14px; 
        }
        .status-dot { 
            width: 8px; 
            height: 8px; 
            border-radius: 50%; 
            background: #4ade80; 
            animation: pulse 2s infinite; 
        }
        @keyframes pulse { 
            0%, 100% { opacity: 1; } 
            50% { opacity: 0.5; } 
        }
        
        /* 主体内容 */
        .content { padding: 30px; }
        
        /* 工作表选择卡片 */
        .sheet-selector { margin-bottom: 30px; }
        .sheet-grid { 
            display: grid; 
            grid-template-columns: repeat(auto-fill, minmax(180px, 1fr)); 
            gap: 12px; 
            margin-top: 15px; 
        }
        .sheet-option { 
            padding: 12px 15px; 
            background: #f8fafc; 
            border: 2px solid #e2e8f0; 
            border-radius: 10px; 
            cursor: pointer; 
            text-align: center; 
            transition: all 0.3s ease; 
        }
        .sheet-option:hover { 
            border-color: #667eea; 
            background: #f1f5f9; 
            transform: translateY(-2px); 
        }
        .sheet-option.active { 
            border-color: #667eea; 
            background: #e0e7ff; 
            font-weight: bold; 
        }
        .sheet-option .emoji { font-size: 20px; margin-bottom: 5px; }
        
        /* 表单 */
        .form-grid { 
            display: grid; 
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); 
            gap: 20px; 
            margin-bottom: 25px; 
        }
        .form-group { margin-bottom: 20px; }
        label { 
            display: block; 
            margin-bottom: 8px; 
            font-weight: 600; 
            color: #374151; 
            font-size: 14px; 
        }
        .required { color: #ef4444; }
        input, select, textarea { 
            width: 100%; 
            padding: 12px 15px; 
            border: 2px solid #e5e7eb; 
            border-radius: 8px; 
            font-size: 15px; 
            transition: border-color 0.2s, box-shadow 0.2s; 
        }
        input:focus, select:focus, textarea:focus { 
            outline: none; 
            border-color: #667eea; 
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1); 
        }
        
        /* 状态消息 */
        .status-message { 
            padding: 15px; 
            border-radius: 10px; 
            margin: 20px 0; 
            text-align: center; 
            font-size: 15px; 
            display: none; 
        }
        .status-success { 
            background: #d1fae5; 
            color: #065f46; 
            border: 1px solid #a7f3d0; 
            display: block; 
        }
        .status-error { 
            background: #fee2e2; 
            color: #7f1d1d; 
            border: 1px solid #fecaca; 
            display: block; 
        }
        .status-info { 
            background: #dbeafe; 
            color: #1e40af; 
            border: 1px solid #bfdbfe; 
            display: block; 
        }
        
        /* 按钮 */
        .btn { 
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); 
            color: white; 
            border: none; 
            padding: 15px 30px; 
            border-radius: 10px; 
            font-size: 16px; 
            font-weight: 600; 
            cursor: pointer; 
            width: 100%; 
            transition: all 0.3s ease; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            gap: 10px; 
        }
        .btn:hover { 
            transform: translateY(-2px); 
            box-shadow: 0 6px 20px rgba(102, 126, 234, 0.4); 
        }
        .btn:disabled { 
            opacity: 0.5; 
            cursor: not-allowed; 
            transform: none !important; 
            box-shadow: none !important; 
        }
        
        /* 加载动画 */
        .spinner { 
            width: 20px; 
            height: 20px; 
            border: 3px solid rgba(255,255,255,0.3); 
            border-radius: 50%; 
            border-top-color: white; 
            animation: spin 1s linear infinite; 
        }
        @keyframes spin { 
            to { transform: rotate(360deg); } 
        }
        
        /* 页脚 */
        .footer { 
            text-align: center; 
            padding: 20px; 
            color: #6b7280; 
            font-size: 13px; 
            border-top: 1px solid #f3f4f6; 
        }
        
        /* 响应式 */
        @media (max-width: 768px) {
            .container { margin: 10px; border-radius: 12px; }
            .header { padding: 20px; }
            .header h1 { font-size: 24px; }
            .sheet-grid { grid-template-columns: repeat(2, 1fr); }
            .form-grid { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>
                <span class="icon">📊</span>
                达人信息同步系统
            </h1>
            <p class="subtitle">多工作表版本 - 数据实时同步到指定Sheet</p>
            <div class="status-indicator" id="connectionStatus">
                <span class="status-dot"></span>
                <span>云端连接正常</span>
            </div>
        </div>
        
        <div class="content">
            <!-- 状态消息 -->
            <div class="status-message" id="statusMessage"></div>
            
            <!-- 工作表选择 -->
            <div class="form-group sheet-selector">
                <label>选择目标工作表 <span class="required">*</span></label>
                <div class="sheet-grid" id="sheetGrid">
                    <!-- 工作表选项将通过JS动态生成 -->
                </div>
            </div>
            
            <!-- 隐藏的sheet选择器（用于表单提交） -->
            <input type="hidden" id="syncSheet" name="syncSheet" value="提报表" required>
            
            <!-- 表单 -->
            <form id="talentForm">
                <div class="form-grid">
                    <div class="form-group">
                        <label for="category">分类 <span class="required">*</span></label>
                        <select id="category" required>
                            <option value="">请选择分类</option>
                            <option value="生活类">生活类</option>
                            <option value="情侣类">情侣类</option>
                            <option value="颜值类">颜值类</option>
                            <option value="宠物类">宠物类</option>
                            <option value="美食类">美食类</option>
                            <option value="运动类">运动类</option>
                            <option value="美妆类">美妆类</option>
                        </select>
                    </div>
                    
                    <div class="form-group">
                        <label for="country">国家/地区</label>
                        <select id="country">
                            <option value="">请选择</option>
                            <option value="墨西哥">墨西哥</option>
                            <option value="菲律宾">菲律宾</option>
                            <option value="印尼">印尼</option>
                            <option value="巴西">巴西</option>
                            <option value="美国">美国</option>
                            <option value="英国">英国</option>
                            <option value="澳大利亚">澳大利亚</option>
                            <option value="马来西亚">马来西亚</option>
                        </select>
                    </div>
                </div>
                
                <div class="form-grid">
                    <div class="form-group">
                        <label for="handle">达人账号 <span class="required">*</span></label>
                        <input type="text" id="handle" required placeholder="@username 或 完整账号名">
                    </div>
                    
                    <div class="form-group">
                        <label for="userLink">主页链接 <span class="required">*</span></label>
                        <input type="url" id="userLink" required placeholder="https://..." value="https://example.com/test">
                    </div>
                </div>
                
                <div class="form-grid">
                    <div class="form-group">
                        <label for="reporter">提报人</label>
                        <input type="text" id="reporter" value="管理员" placeholder="您的姓名">
                    </div>
                    
                    <div class="form-group">
                        <label for="level">粉丝量级</label>
                        <select id="level">
                            <option value="">请选择</option>
                            <option value="1M+">1M+ (头部)</option>
                            <option value="500K-1M">500K-1M (腰部)</option>
                            <option value="100K-500K">100K-500K (初级)</option>
                            <option value="10K-100K">10K-100K (新人)</option>
                        </select>
                    </div>
                </div>
                
                <div class="form-group">
                    <label for="remark">备注</label>
                    <textarea id="remark" rows="3" placeholder="其他需要说明的信息..."></textarea>
                </div>
                
                <!-- 提交按钮 -->
                <button type="submit" class="btn" id="submitBtn">
                    <span id="btnText">🚀 提交到Google Sheets</span>
                    <span id="btnLoading" style="display:none;">
                        <span class="spinner"></span>
                        处理中...
                    </span>
                </button>
            </form>
        </div>
        
        <div class="footer">
            <p>© 2024 达人管理系统 | 版本: 多Sheet同步版 1.0.0</p>
            <p id="connectionInfo">正在检查云端连接...</p>
        </div>
    </div>

    <script>
        // 🔧 配置区域
        // 请将下面的URL替换为您在第二步中获取的GAS部署URL
        const GAS_URL = 'https://script.google.com/macros/s/AKfycbySiHRzMWFz112S3KFHRgDgM0Sd19bjg7gAoOiVs5Px70zvboR_GYf6_o_dnhq58blfhw/exec';
        
        // 可用的工作表列表
        const AVAILABLE_SHEETS = [
            { name: '提报表', emoji: '📊', default: true },
            { name: '墨西哥（子豪）', emoji: '🇲🇽' },
            { name: '菲律宾（邓）', emoji: '🇵🇭' },
            { name: '印尼（子豪）', emoji: '🇮🇩' },
            { name: '巴西（子豪）', emoji: '🇧🇷' },
            { name: '各地区', emoji: '🌍' },
            { name: '澳大利亚', emoji: '🇦🇺' },
            { name: '阿根廷（东）', emoji: '🇦🇷' },
            { name: '英国', emoji: '🇬🇧' },
            { name: '美区（nana）', emoji: '🇺🇸' },
            { name: '西班牙（nana）', emoji: '🇪🇸' },
            { name: '中东（nana）', emoji: '🌍' },
            { name: '马来西亚', emoji: '🇲🇾' },
            { name: 'eu', emoji: '🇪🇺' },
            { name: 'ytb美国', emoji: '📺' }
        ];
        
        // 页面加载完成
        document.addEventListener('DOMContentLoaded', function() {
            console.log('🚀 达人管理系统 - 多Sheet版已启动');
            console.log('🌐 后端地址:', GAS_URL);
            
            // 初始化工作表选择器
            initSheetSelector();
            
            // 设置表单提交事件
            setupFormSubmit();
            
            // 测试云端连接
            testConnection();
            
            // 设置表单重置功能
            setupFormReset();
        });
        
        // 初始化工作表选择器
        function initSheetSelector() {
            const sheetGrid = document.getElementById('sheetGrid');
            const syncSheetInput = document.getElementById('syncSheet');
            
            // 清空现有选项
            sheetGrid.innerHTML = '';
            
            // 创建每个工作表的选项
            AVAILABLE_SHEETS.forEach((sheet, index) => {
                const sheetElement = document.createElement('div');
                sheetElement.className = 'sheet-option';
                if (sheet.default) {
                    sheetElement.classList.add('active');
                }
                
                sheetElement.innerHTML = `
                    <div class="emoji">${sheet.emoji}</div>
                    <div>${sheet.name}</div>
                `;
                
                // 点击事件
                sheetElement.addEventListener('click', () => {
                    // 移除所有激活状态
                    document.querySelectorAll('.sheet-option').forEach(el => {
                        el.classList.remove('active');
                    });
                    
                    // 激活当前选项
                    sheetElement.classList.add('active');
                    
                    // 更新隐藏输入框
                    syncSheetInput.value = sheet.name;
                    
                    // 显示状态消息
                    showStatus(`已选择工作表: ${sheet.name}`, 'info', 2000);
                    
                    console.log(`📄 选择工作表: ${sheet.name}`);
                });
                
                sheetGrid.appendChild(sheetElement);
            });
            
            console.log(`📄 已初始化 ${AVAILABLE_SHEETS.length} 个工作表选项`);
        }
        
        // 设置表单提交
        function setupFormSubmit() {
            const form = document.getElementById('talentForm');
            const submitBtn = document.getElementById('submitBtn');
            const btnText = document.getElementById('btnText');
            const btnLoading = document.getElementById('btnLoading');
            
            form.addEventListener('submit', async function(event) {
                event.preventDefault();
                console.log('📤 开始提交表单...');
                
                // 验证表单
                if (!validateForm()) {
                    return;
                }
                
                // 显示加载状态
                submitBtn.disabled = true;
                btnText.style.display = 'none';
                btnLoading.style.display = 'flex';
                
                showStatus('正在提交数据到云端...', 'info');
                
                try {
                    // 收集表单数据
                    const formData = collectFormData();
                    console.log('📦 提交的数据:', formData);
                    
                    // 发送请求到GAS后端
                    const response = await fetch(GAS_URL, {
                        method: 'POST',
                        headers: {
                            'Content-Type': 'application/json',
                        },
                        body: JSON.stringify(formData)
                    });
                    
                    console.log('📨 服务器响应状态:', response.status);
                    
                    // 解析响应
                    const result = await response.json();
                    console.log('✅ 服务器返回:', result);
                    
                    if (result.success) {
                        // 提交成功
                        const sheetName = formData.syncSheet;
                        showStatus(`✅ 成功！数据已保存到【${sheetName}】工作表`, 'success');
                        
                        // 3秒后重置表单
                        setTimeout(() => {
                            form.reset();
                            document.getElementById('reporter').value = '管理员';
                            document.getElementById('userLink').value = 'https://example.com/test';
                            hideStatus();
                        }, 3000);
                        
                    } else {
                        // 服务器返回错误
                        throw new Error(result.message || '服务器处理失败');
                    }
                    
                } catch (error) {
                    console.error('❌ 提交失败:', error);
                    
                    // 显示错误信息
                    let errorMsg = `❌ 提交失败: ${error.message}`;
                    
                    if (error.message.includes('Failed to fetch') || error.message.includes('NetworkError')) {
                        errorMsg = `
                            ❌ 网络连接失败<br>
                            <small>请检查：<br>
                            1. 网络连接是否正常<br>
                            2. GAS_URL是否正确配置<br>
                            3. 浏览器控制台(F12)查看详细错误</small>
                        `;
                    } else if (error.message.includes('syntax')) {
                        errorMsg = '❌ 服务器响应格式错误，请检查GAS后端配置';
                    }
                    
                    showStatus(errorMsg, 'error');
                    
                } finally {
                    // 恢复按钮状态
                    submitBtn.disabled = false;
                    btnText.style.display = 'flex';
                    btnLoading.style.display = 'none';
                }
            });
        }
        
        // 收集表单数据
        function collectFormData() {
            return {
                category: document.getElementById('category').value,
                handle: document.getElementById('handle').value,
                userLink: document.getElementById('userLink').value,
                syncSheet: document.getElementById('syncSheet').value,
                reporter: document.getElementById('reporter').value || '管理员',
                country: document.getElementById('country').value || '',
                level: document.getElementById('level').value || '',
                remark: document.getElementById('remark').value || ''
            };
        }
        
        // 验证表单
        function validateForm() {
            const requiredIds = ['category', 'handle', 'userLink', 'syncSheet'];
            const missingFields = [];
            
            // 检查必填字段
            requiredIds.forEach(fieldId => {
                const element = document.getElementById(fieldId);
                if (!element || !element.value.trim()) {
                    const fieldName = getFieldLabel(fieldId);
                    missingFields.push(fieldName);
                    
                    // 高亮显示错误
                    if (element) {
                        element.style.borderColor = '#ef4444';
                        setTimeout(() => {
                            if (element) element.style.borderColor = '';
                        }, 3000);
                    }
                }
            });
            
            // 检查URL格式
            const urlInput = document.getElementById('userLink');
            if (urlInput && urlInput.value.trim()) {
                const url = urlInput.value.trim();
                if (!url.startsWith('http://') && !url.startsWith('https://')) {
                    showStatus('❌ 主页链接必须以 http:// 或 https:// 开头', 'error');
                    urlInput.style.borderColor = '#ef4444';
                    setTimeout(() => { urlInput.style.borderColor = ''; }, 3000);
                    return false;
                }
            }
            
            if (missingFields.length > 0) {
                showStatus(`❌ 请填写以下必填项: ${missingFields.join('、')}`, 'error');
                return false;
            }
            
            return true;
        }
        
        // 获取字段标签
        function getFieldLabel(fieldId) {
            const labels = {
                'category': '分类',
                'handle': '达人账号',
                'userLink': '主页链接',
                'syncSheet': '目标工作表'
            };
            return labels[fieldId] || fieldId;
        }
        
        // 测试云端连接
        async function testConnection() {
            const connectionInfo = document.getElementById('connectionInfo');
            
            try {
                // 尝试访问GAS的GET端点
                const response = await fetch(GAS_URL);
                const data = await response.json();
                
                if (data.success) {
                    connectionInfo.textContent = `✅ 云端连接正常 | ${data.version}`;
                    connectionInfo.style.color = '#10b981';
                } else {
                    connectionInfo.textContent = '⚠️ 云端连接异常';
                    connectionInfo.style.color = '#f59e0b';
                }
            } catch (error) {
                connectionInfo.textContent = '❌ 云端连接失败，请检查网络';
                connectionInfo.style.color = '#ef4444';
                console.error('云端连接测试失败:', error);
            }
        }
        
        // 设置表单重置功能
        function setupFormReset() {
            // 回车键自动聚焦下一个字段
            document.querySelectorAll('input, select').forEach((input, index, inputs) => {
                input.addEventListener('keydown', (e) => {
                    if (e.key === 'Enter' && !e.shiftKey) {
                        e.preventDefault();
                        if (index < inputs.length - 1) {
                            inputs[index + 1].focus();
                        } else {
                            document.getElementById('submitBtn').click();
                        }
                    }
                });
            });
            
            // Ctrl+Enter 提交表单
            document.addEventListener('keydown', (e) => {
                if (e.ctrlKey && e.key === 'Enter') {
                    document.getElementById('submitBtn').click();
                }
            });
        }
        
        // 显示状态消息
        function showStatus(message, type = 'info', duration = 0) {
            const statusEl = document.getElementById('statusMessage');
            statusEl.innerHTML = message;
            statusEl.className = 'status-message status-' + type;
            statusEl.style.display = 'block';
            
            // 自动隐藏
            if (duration > 0) {
                setTimeout(() => {
                    if (statusEl.innerHTML === message) {
                        statusEl.style.display = 'none';
                    }
                }, duration);
            }
        }
        
        // 隐藏状态消息
        function hideStatus() {
            const statusEl = document.getElementById('statusMessage');
            statusEl.style.display = 'none';
        }
    </script>
</body>
</html>
