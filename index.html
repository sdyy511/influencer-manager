<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>达人信息同步系统 - 完整版</title>
    <style>
        /* 基础样式 */
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Microsoft YaHei', sans-serif; }
        body { background: #f0f2f5; padding: 20px; min-height: 100vh; }
        
        /* 容器 */
        .container { 
            max-width: 800px; 
            margin: 30px auto; 
            background: white; 
            border-radius: 12px; 
            box-shadow: 0 5px 20px rgba(0,0,0,0.1); 
            padding: 35px; 
        }
        
        /* 标题 */
        h1 { 
            color: #2d3748; 
            margin-bottom: 8px; 
            font-size: 28px; 
            display: flex; 
            align-items: center; 
            gap: 10px; 
        }
        h1::before { content: '📊'; font-size: 32px; }
        .subtitle { 
            color: #718096; 
            margin-bottom: 25px; 
            font-size: 15px; 
        }
        
        /* 系统状态 */
        .system-status { 
            background: #e6fffa; 
            border: 1px solid #81e6d9; 
            border-radius: 8px; 
            padding: 12px 16px; 
            margin-bottom: 25px; 
            color: #22543d; 
        }
        
        /* 表单组 */
        .form-group { margin-bottom: 22px; }
        label { 
            display: block; 
            margin-bottom: 8px; 
            font-weight: 600; 
            color: #4a5568; 
        }
        .required { color: #e53e3e; }
        
        /* 输入框 */
        input, select, textarea { 
            width: 100%; 
            padding: 13px 15px; 
            border: 2px solid #e2e8f0; 
            border-radius: 8px; 
            font-size: 16px; 
            transition: border 0.2s; 
        }
        input:focus, select:focus, textarea:focus { 
            outline: none; 
            border-color: #4299e1; 
            box-shadow: 0 0 0 3px rgba(66, 153, 225, 0.1); 
        }
        
        /* 按钮 */
        .btn { 
            background: linear-gradient(135deg, #4299e1 0%, #667eea 100%); 
            color: white; 
            padding: 15px 30px; 
            border: none; 
            border-radius: 8px; 
            font-size: 16px; 
            font-weight: 600; 
            cursor: pointer; 
            width: 100%; 
            transition: all 0.2s; 
        }
        .btn:hover { 
            transform: translateY(-2px); 
            box-shadow: 0 4px 12px rgba(66, 153, 225, 0.3); 
        }
        .btn:disabled { 
            opacity: 0.5; 
            cursor: not-allowed; 
            transform: none; 
            box-shadow: none; 
        }
        
        /* 状态消息 */
        .status { 
            padding: 15px; 
            border-radius: 8px; 
            margin: 20px 0; 
            text-align: center; 
            display: none; 
            font-size: 15px; 
        }
        .success { 
            background: #c6f6d5; 
            color: #155724; 
            border: 1px solid #9ae6b4; 
            display: block; 
        }
        .error { 
            background: #fed7d7; 
            color: #742a2a; 
            border: 1px solid #fc8181; 
            display: block; 
        }
        .info { 
            background: #bee3f8; 
            color: #2a4365; 
            border: 1px solid #90cdf4; 
            display: block; 
        }
        
        /* 行布局 */
        .field-row { 
            display: flex; 
            gap: 20px; 
        }
        .field-row > .form-group { flex: 1; }
        
        /* 帮助文本 */
        .help-text { 
            font-size: 13px; 
            color: #a0aec0; 
            margin-top: 5px; 
        }
        
        /* 加载动画 */
        .loading { 
            display: inline-block; 
            width: 18px; 
            height: 18px; 
            border: 2px solid rgba(255,255,255,.3); 
            border-radius: 50%; 
            border-top-color: white; 
            animation: spin 1s linear infinite; 
            margin-right: 8px; 
        }
        @keyframes spin { 
            to { transform: rotate(360deg); } 
        }
        
        /* 响应式 */
        @media (max-width: 768px) {
            .container { padding: 25px; margin: 15px auto; }
            .field-row { flex-direction: column; gap: 15px; }
            h1 { font-size: 24px; }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>达人信息同步系统</h1>
        <p class="subtitle">完整版 · 数据实时同步到Google Sheets指定工作表</p>
        
        <div class="system-status">
            ✅ 系统在线。支持多工作表同步，按地区分类管理。
        </div>
        
        <!-- 状态消息显示区域 -->
        <div id="statusMessage" class="status"></div>
        
        <!-- 主表单 -->
        <form id="talentForm">
            <!-- 基础信息 -->
            <div class="form-group">
                <label for="category">分类 <span class="required">*</span></label>
                <select id="category" required>
                    <option value="">请选择达人分类</option>
                    <option value="生活类">生活类</option>
                    <option value="情侣类">情侣类</option>
                    <option value="颜值类">颜值类</option>
                    <option value="宠物类">宠物类</option>
                    <option value="美食类">美食类</option>
                    <option value="运动类">运动类</option>
                    <option value="美妆类">美妆类</option>
                </select>
            </div>

            <!-- 个人信息 -->
            <div class="field-row">
                <div class="form-group">
                    <label for="gender">性别</label>
                    <select id="gender">
                        <option value="">请选择</option>
                        <option value="男">男</option>
                        <option value="女">女</option>
                        <option value="组合">组合</option>
                        <option value="品牌">品牌</option>
                    </select>
                </div>
                <div class="form-group">
                    <label for="reporter">提报人</label>
                    <input type="text" id="reporter" placeholder="您的姓名" value="管理员">
                </div>
            </div>

            <!-- 地区信息 -->
            <div class="field-row">
                <div class="form-group">
                    <label for="country">国家/地区</label>
                    <select id="country">
                        <option value="">请选择</option>
                        <option value="墨西哥">墨西哥</option>
                        <option value="菲律宾">菲律宾</option>
                        <option value="印尼">印尼</option>
                        <option value="巴西">巴西</option>
                        <option value="美国">美国</option>
                        <option value="英国">英国</option>
                        <option value="澳大利亚">澳大利亚</option>
                        <option value="马来西亚">马来西亚</option>
                    </select>
                </div>
                <div class="form-group">
                    <label for="level">粉丝量级</label>
                    <select id="level">
                        <option value="">请选择</option>
                        <option value="1M+">1M+ (头部)</option>
                        <option value="500K-1M">500K-1M (腰部)</option>
                        <option value="100K-500K">100K-500K (初级)</option>
                        <option value="10K-100K">10K-100K (新人)</option>
                        <option value="<10K"><10K (纳米)</option>
                    </select>
                </div>
            </div>

            <!-- 账号信息 -->
            <div class="form-group">
                <label for="handle">达人账号 <span class="required">*</span></label>
                <input type="text" id="handle" required placeholder="@username 或 完整账号名">
                <p class="help-text">请输入达人的唯一标识，如抖音号、B站UID等</p>
            </div>
            
            <div class="form-group">
                <label for="userLink">主页链接 <span class="required">*</span></label>
                <input type="url" id="userLink" required placeholder="https://..." value="https://example.com/test">
                <p class="help-text">完整的URL链接，支持http://或https://</p>
            </div>
            
            <!-- 工作表选择 -->
            <div class="form-group">
                <label for="syncSheet">同步到工作表 <span class="required">*</span></label>
                <select id="syncSheet" required>
                    <option value="">请选择目标工作表</option>
                    <option value="提报表" selected>提报表（默认）</option>
                    <option value="墨西哥（子豪）">墨西哥（子豪）</option>
                    <option value="菲律宾（邓）">菲律宾（邓）</option>
                    <option value="印尼（子豪）">印尼（子豪）</option>
                    <option value="巴西（子豪）">巴西（子豪）</option>
                    <option value="各地区">各地区</option>
                    <option value="澳大利亚">澳大利亚</option>
                    <option value="阿根廷（东）">阿根廷（东）</option>
                    <option value="英国">英国</option>
                    <option value="美区（nana）">美区（nana）</option>
                    <option value="西班牙（nana）">西班牙（nana）</option>
                    <option value="中东（nana）">中东（nana）</option>
                    <option value="马来西亚">马来西亚</option>
                    <option value="eu">eu</option>
                    <option value="ytb美国">ytb美国</option>
                </select>
                <p class="help-text">选择要将此达人信息同步到哪个工作表</p>
            </div>
            
            <!-- 其他信息 -->
            <div class="field-row">
                <div class="form-group">
                    <label for="fans">粉丝数</label>
                    <input type="text" id="fans" placeholder="例如：150K 或 1.2M">
                </div>
                <div class="form-group">
                    <label for="contact">联系方式</label>
                    <input type="text" id="contact" placeholder="邮箱/微信/电话">
                </div>
            </div>
            
            <div class="form-group">
                <label for="remark">备注</label>
                <textarea id="remark" rows="3" placeholder="其他需要说明的信息..."></textarea>
            </div>

            <!-- 提交按钮 -->
            <div class="form-group" style="margin-top: 30px;">
                <button type="submit" class="btn" id="submitBtn">
                    <span id="btnText">🚀 提交到Google Sheets</span>
                    <span id="btnLoading" style="display:none;">
                        <span class="loading"></span> 提交中...
                    </span>
                </button>
                <p class="help-text" style="text-align: center; margin-top: 10px;">
                    数据将实时保存到您选择的Google Sheets工作表
                </p>
            </div>
        </form>
    </div>

    <script>
        // 🔧 配置：请替换为您自己的GAS Web App URL
        const GAS_URL = '【您的GAS_URL】';
        // 注意：替换【您的GAS_URL】为第二步中复制的URL，例如：
        // const GAS_URL = 'https://script.google.com/macros/s/AKfycbwhCPs_IAPnBcVXXULOW4RKlS6en8pz-SoO1PUwNJ9ZamUVnJ7zaVLb51Wu6qb5AcZY8w/exec';
        
        // 页面加载完成
        document.addEventListener('DOMContentLoaded', function() {
            console.log('🚀 系统启动完成');
            console.log('🌐 后端地址:', GAS_URL);
            
            // 设置默认提报人
            document.getElementById('reporter').value = '管理员';
            
            // 设置表单提交事件
            setupFormSubmit();
            
            // 设置国家与工作表的智能关联
            setupCountrySheetLink();
        });
        
        // 设置表单提交
        function setupFormSubmit() {
            const form = document.getElementById('talentForm');
            const submitBtn = document.getElementById('submitBtn');
            const btnText = document.getElementById('btnText');
            const btnLoading = document.getElementById('btnLoading');
            
            form.addEventListener('submit', async function(event) {
                event.preventDefault();
                console.log('📤 开始提交数据...');
                
                // 验证表单
                if (!validateForm()) {
                    return;
                }
                
                // 显示加载状态
                submitBtn.disabled = true;
                btnText.style.display = 'none';
                btnLoading.style.display = 'inline';
                
                showStatus('info', '正在将数据发送到云端服务器...');
                
                try {
                    // 1. 收集表单数据
                    const formData = collectFormData();
                    console.log('📦 提交数据:', formData);
                    
                    // 2. 发送数据到GAS后端
                    const response = await fetch(GAS_URL, {
                        method: 'POST',
                        headers: {
                            'Content-Type': 'application/json; charset=utf-8',
                        },
                        body: JSON.stringify(formData)
                    });
                    
                    console.log('📨 服务器响应状态:', response.status, response.statusText);
                    
                    // 3. 解析响应
                    const result = await response.json();
                    console.log('✅ 服务器返回数据:', result);
                    
                    if (result.success) {
                        // 成功！
                        const selectedSheet = document.getElementById('syncSheet').value;
                        showStatus('success', result.message || `✅ 数据已成功保存到【${selectedSheet}】工作表！`);
                        
                        // 3秒后清空表单
                        setTimeout(() => {
                            form.reset();
                            document.getElementById('reporter').value = '管理员'; // 重置默认值
                            document.getElementById('userLink').value = 'https://example.com/test'; // 重置测试链接
                            hideStatus();
                        }, 3000);
                        
                    } else {
                        // GAS处理数据时出错
                        throw new Error(result.message || '服务器处理失败');
                    }
                    
                } catch (error) {
                    // 网络错误、JSON解析错误或GAS返回错误
                    console.error('❌ 提交失败:', error);
                    
                    // 显示详细错误信息
                    let errorMsg = `❌ 提交失败: ${error.message}`;
                    if (error.message.includes('Failed to fetch') || error.message.includes('NetworkError')) {
                        errorMsg = '❌ 网络连接失败。请检查：<br>1. 网络连接是否正常<br>2. 上方GAS_URL是否配置正确<br>3. 按F12打开浏览器控制台查看具体错误';
                    }
                    
                    showStatus('error', errorMsg);
                    
                } finally {
                    // 恢复按钮状态
                    submitBtn.disabled = false;
                    btnText.style.display = 'inline';
                    btnLoading.style.display = 'none';
                }
            });
        }
        
        // 收集表单数据
        function collectFormData() {
            return {
                // 基础信息
                category: document.getElementById('category').value,
                gender: document.getElementById('gender').value,
                reporter: document.getElementById('reporter').value || '管理员',
                devDate: new Date().toISOString().split('T')[0], // 今天
                country: document.getElementById('country').value,
                level: document.getElementById('level').value,
                
                // 账号信息
                handle: document.getElementById('handle').value,
                userLink: document.getElementById('userLink').value,
                
                // 工作表选择
                syncSheet: document.getElementById('syncSheet').value,
                
                // 其他信息
                fans: document.getElementById('fans').value || '0',
                avgViews: '0', // 默认值
                contact: document.getElementById('contact').value || '',
                price: '', // 默认值
                remark: document.getElementById('remark').value || '',
                feedback: '', // 默认值
                ins: '' // 默认值
            };
        }
        
        // 表单验证
        function validateForm() {
            const requiredIds = ['category', 'handle', 'userLink', 'syncSheet'];
            const missingFields = [];
            
            requiredIds.forEach(fieldId => {
                const element = document.getElementById(fieldId);
                if (!element.value || element.value.trim() === '') {
                    const labelText = element.previousElementSibling?.textContent.replace('*', '').trim() || fieldId;
                    missingFields.push(labelText);
                    element.style.borderColor = '#e53e3e';
                    setTimeout(() => { element.style.borderColor = ''; }, 3000);
                }
            });
            
            if (missingFields.length > 0) {
                showStatus('error', `请填写以下必填项: ${missingFields.join('、')}`);
                return false;
            }
            
            // URL格式验证
            const urlInput = document.getElementById('userLink');
            if (!urlInput.value.startsWith('http://') && !urlInput.value.startsWith('https://')) {
                showStatus('error', '主页链接应以 http:// 或 https:// 开头');
                urlInput.style.borderColor = '#e53e3e';
                setTimeout(() => { urlInput.style.borderColor = ''; }, 3000);
                return false;
            }
            
            return true;
        }
        
        // 设置国家与工作表的智能关联
        function setupCountrySheetLink() {
            const countrySelect = document.getElementById('country');
            const sheetSelect = document.getElementById('syncSheet');
            
            // 国家到工作表的映射建议
            const countrySheetMap = {
                '墨西哥': ['墨西哥（子豪）', '墨西哥'],
                '菲律宾': ['菲律宾（邓）', '菲律宾'],
                '印尼': ['印尼（子豪）', '印尼'],
                '巴西': ['巴西（子豪）', '巴西'],
                '美国': ['美区（nana）', '美国', 'ytb美国'],
                '英国': ['英国', 'eu'],
                '澳大利亚': ['澳大利亚'],
                '马来西亚': ['马来西亚']
            };
            
            countrySelect.addEventListener('change', function() {
                const country = this.value;
                if (!country || !countrySheetMap[country]) return;
                
                // 查找匹配的工作表
                const matchingSheets = countrySheetMap[country];
                for (let i = 0; i < sheetSelect.options.length; i++) {
                    if (matchingSheets.includes(sheetSelect.options[i].value)) {
                        sheetSelect.selectedIndex = i;
                        showStatus('info', `💡 已根据国家自动选择工作表: ${sheetSelect.value}`, 2000);
                        break;
                    }
                }
            });
        }
        
        // 显示状态消息
        function showStatus(type, message, duration = 0) {
            const statusEl = document.getElementById('statusMessage');
            statusEl.innerHTML = message;
            statusEl.className = 'status ' + type;
            statusEl.style.display = 'block';
            
            if (duration > 0) {
                setTimeout(() => {
                    if (statusEl.innerHTML === message) {
                        statusEl.style.display = 'none';
                    }
                }, duration);
            }
        }
        
        function hideStatus() {
            const statusEl = document.getElementById('statusMessage');
            statusEl.style.display = 'none';
        }
        
        // 键盘快捷键：Ctrl+Enter 提交表单
        document.addEventListener('keydown', function(e) {
            if (e.ctrlKey && e.key === 'Enter') {
                document.getElementById('submitBtn').click();
            }
        });
    </script>
</body>
</html>
